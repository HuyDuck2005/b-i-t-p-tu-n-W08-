services:
  db:
    image: postgres:15-alpine
    container_name: todo_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mydb
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
  api:
    build: .
    container_name: todo_api
    ports:
      - "${PORT:-3443}:3443"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
volumes:
  db_data: